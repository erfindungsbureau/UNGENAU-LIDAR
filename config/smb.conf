[global]
   workgroup = WORKGROUP
   server string = LiDAR Scanner
   netbios name = lidar
   security = user
   map to guest = never

[lidar_data]
   path = /media/nvidia/SSD/lidar_data
   browseable = yes
   read only = no
   valid users = nvidia
   create mask = 0664
   directory mask = 0775
   comment = LiDAR Scan Data (bags, maps, exports)
